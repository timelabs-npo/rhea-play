name: RheaPlay
options:
  bundleIdPrefix: com.rhea
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.2"

packages:
  RheaKit:
    path: packages/RheaKit
  Pow:
    url: https://github.com/serg-alexv/Pow
    from: "1.0.0"

targets:
  RheaPlay:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rhea.play
        DEVELOPMENT_TEAM: "398XACWZ7G"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
      configs:
        debug: {}
        release: {}
    dependencies:
      - package: RheaKit
      - package: Pow
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Rhea Play
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
